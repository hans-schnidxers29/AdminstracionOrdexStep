# -------------------------
# Aplicación y Servidor
# -------------------------
spring.application.name=OrdexStep
server.port=8082
server.servlet.context-path=
server.error.include-message=always

# -------------------------
# Internacionalización (Configura $ COP y Fecha Colombia)
# -------------------------
spring.mvc.locale=es-CO
spring.jackson.time-zone=America/Bogota
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# -------------------------
# PostgreSQL - Neon / Render
# -------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
# Usa 'validate' en producción, 'update' solo en desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
# Optimización de consultas
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -------------------------
# HikariCP (Optimizado para Neon/Render)
# -------------------------
# Neon cierra conexiones inactivas rápido; estos valores evitan errores de "Connection closed"
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=20000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.pool-name=OrdexStepPool

# -------------------------
# Recursos Estáticos y Thymeleaf
# -------------------------
spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.cache=true
