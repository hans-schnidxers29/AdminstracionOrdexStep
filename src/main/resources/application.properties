spring.application.name=OrdexStep
server.port=8082

# -------------------------
# PostgreSQL - Neon / Render
# -------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -------------------------
# HikariCP Mejorado
# -------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=haxliouPostgresPool


spring.datasource.hikari.max-lifetime=600000

# Tiempo de espera para obtener conexion antes de lanzar error
spring.datasource.hikari.connection-timeout=30000

spring.datasource.hikari.keepalive-time=45000
spring.web.resources.static-locations=classpath:/static/
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_APP}
spring.mail.password=${PASSWORD_EMAIL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
logging.level.org.springframework.mail=DEBUG
