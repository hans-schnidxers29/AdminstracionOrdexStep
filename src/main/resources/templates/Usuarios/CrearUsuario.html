<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{Base/layoutBase}">
<head>
  <title>Gestión de Administradores</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<div layout:fragment="content">
  <div class="max-w-6xl mx-auto mt-10 p-4">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-extrabold text-gray-800">Administradores</h2>
      <button onclick="toggleModal(true)"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition">
        + Nuevo Administrador
      </button>
    </div>

    <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
      <table class="min-w-full leading-normal">
        <thead>
        <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
          <th class="px-5 py-3 border-b-2">Nombre</th>
          <th class="px-5 py-3 border-b-2">Usuario</th>
          <th class="px-5 py-3 border-b-2">Email</th>
          <th class="px-5 py-3 border-b-2">Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaUsuarios">
        </tbody>
      </table>
    </div>
  </div>

  <div id="modalUsuario" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
      <div class="bg-indigo-600 p-4 flex justify-between items-center">
        <h3 class="text-xl font-bold text-white">Registro de Administrador</h3>
        <button onclick="toggleModal(false)" class="text-white text-2xl">&times;</button>
      </div>

      <form id="formRegistro" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Nombre Completo</label>
          <input type="text" id="nombre" required class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Nombre de Usuario</label>
          <input type="text" id="usuario" required class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
          <input type="email" id="email" required class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Contraseña</label>
          <input type="password" id="password" required class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" onclick="toggleModal(false)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">Cancelar</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script th:inline="javascript">
    const CONTEXT_PATH = /*[[${#httpServletRequest.contextPath}]]*/ '';
    const API = CONTEXT_PATH + '/api';

    // 1. FUNCIONALIDAD DEL MODAL
    function toggleModal(show) {
      const modal = document.getElementById('modalUsuario');
      show ? modal.classList.remove('hidden') : modal.classList.add('hidden');
      if(!show) document.getElementById('formRegistro').reset();
    }

    // 2. CARGAR LISTA DE USUARIOS
    async function cargarUsuarios() {
      try {
        const response = await axios.get(`${API}/usuarios/listar`);
        const tbody = document.getElementById('tablaUsuarios');
        tbody.innerHTML = ''; // Limpiar tabla

        response.data.forEach(user => {
          tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-5 py-4 border-b text-sm font-medium text-gray-900">${user.nombre}</td>
                            <td class="px-5 py-4 border-b text-sm text-gray-600">${user.usuario}</td>
                            <td class="px-5 py-4 border-b text-sm text-gray-600">${user.email}</td>
                            <td class="px-5 py-4 border-b text-sm">
                                <button class="text-indigo-600 hover:text-indigo-900 font-bold">Editar</button>
                            </td>
                        </tr>
                    `;
        });
      } catch (err) {
        console.error("Error al cargar usuarios", err);
      }
    }

    // 3. ENVIAR FORMULARIO (POST)
    document.getElementById('formRegistro').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        nombre: document.getElementById('nombre').value,
        usuario: document.getElementById('usuario').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        await axios.post(`${API}/usuarios/crear`, payload);
        alert('¡Administrador creado!');
        toggleModal(false); // Cerrar modal
        cargarUsuarios();   // Recargar la tabla automáticamente
      } catch (err) {
        alert(err.response?.data || "Error al crear");
      }
    };

    // Cargar datos al iniciar la página
    window.onload = cargarUsuarios;
  </script>
</div>
</body>
</html>
