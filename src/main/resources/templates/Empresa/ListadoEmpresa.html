<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{Base/layoutBase}"> <head>
    <title>Admin - Gestión de Empresas</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<div layout:fragment="content">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Panel de Control</h1>
                <p class="text-gray-500">Gestión de suscripciones y estados de empresas</p>
            </div>
            <button onclick="cargarEmpresas()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition-all shadow-md">
                Refrescar Lista
            </button>
        </header>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Empresa</th>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">NIT / Razón Social</th>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Plan</th>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado</th>
                    <th class="px-6 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Acción</th>
                </tr>
                </thead>
                <tbody id="lista-empresas" class="divide-y divide-gray-200 bg-white text-sm">
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalGestion" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl">
            <h2 id="modalNombreEmpresa" class="text-xl font-bold mb-4 text-gray-800">Gestionar Empresa</h2>
            <form id="formGestion">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" id="modalIdEmpresa">

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cambiar Plan</label>
                    <select id="selectPlan" onchange="togglePlanPruebas()" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></select>
                </div>

                <div class="mb-6 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="checkEstado" class="h-5 w-5 text-indigo-600 rounded focus:ring-indigo-500">
                        <div>
                            <span class="text-gray-800 font-semibold block">Empresa Activa</span>
                            <span class="text-xs text-gray-500 italic">Desmarca para desactivar el acceso</span>
                        </div>
                    </label>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Suscripción</label>
                    <select id="selectTipoSuscripcion" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        <option value="MENSUAL">Mensual (1 mes)</option>
                        <option value="TRIMESTRAL">Trimestral (3 meses)</option>
                        <option value="ANUAL">Anual (12 meses)</option>
                        <option value="PRUEBAS">Pruebas</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Inicio</label>
                    <input type="date" id="fechaInicio" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                </div>

                <div id="campoFechaFinManual" class="mb-4 hidden">
                    <label class="block text-sm font-bold text-indigo-600 mb-1">Fecha Fin (Personalizada)</label>
                    <input type="date" id="fechaFinManual" class="w-full border-indigo-400 rounded-lg shadow-sm focus:ring-indigo-500 bg-indigo-50">
                </div>

                <div class="flex space-x-3 mt-4">
                    <button type="button" onclick="cerrarModal()" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg font-semibold hover:bg-gray-300 transition">Cancelar</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-lg">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        // Se recomienda mantener la lógica aquí para que se ejecute al cargar este fragmento
        const CONTEXT_PATH = /*[[${#httpServletRequest.contextPath}]]*/ '';
        const API = CONTEXT_PATH + '/api'; // URL relativa con context-path

        const token = document.querySelector('input[name="_csrf"]')?.value;
        if (token) {
            axios.defaults.headers.common['X-CSRF-TOKEN'] = token;
        }

        function togglePlanPruebas() {
            const select = document.getElementById('selectPlan');
            const nombrePlan = select.options[select.selectedIndex]?.text;
            const divManual = document.getElementById('campoFechaFinManual');
            if (nombrePlan === "Plan Pruebas") {
                divManual.classList.remove('hidden');
            } else {
                divManual.classList.add('hidden');
            }
        }

        async function cargarEmpresas() {
            try {
                const { data } = await axios.get(`${API}/empresas`);
                const tbody = document.getElementById('lista-empresas');
                tbody.innerHTML = data.map(e => `
                    <tr class="hover:bg-gray-50 transition border-b">
                        <td class="px-6 py-4 font-bold text-gray-900">${e.nombre}</td>
                        <td class="px-6 py-4 text-xs">
                            <div class="text-gray-400">NIT: ${e.nit || 'N/A'}</div>
                            <div class="text-gray-600">${e.razonSocial || '-'}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-[10px] font-bold uppercase">
                                ${e.plan ? e.plan.nombre : 'Sin Plan'}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 ${e.estado ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} rounded text-[11px] font-medium">
                                ${e.estado ? 'ACTIVO' : 'INACTIVO'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick='abrirModal(${JSON.stringify(e)})' class="text-indigo-600 hover:bg-indigo-50 border border-indigo-200 px-3 py-1 rounded-md text-xs font-bold transition">
                                Gestionar
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function abrirModal(empresa) {
            document.getElementById('modalNombreEmpresa').innerText = empresa.nombre;
            document.getElementById('modalIdEmpresa').value = empresa.id;
            document.getElementById('checkEstado').checked = empresa.estado;
            document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];

            const select = document.getElementById('selectPlan');
            const resPlanes = await axios.get(`${API}/planes`);
            select.innerHTML = resPlanes.data.map(p => `
                <option value="${p.id}" ${empresa.plan && p.id === empresa.plan.id ? 'selected' : ''}>${p.nombre}</option>
            `).join('');

            togglePlanPruebas();
            document.getElementById('modalGestion').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalGestion').classList.add('hidden');
        }

        document.getElementById('formGestion').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('modalIdEmpresa').value;
            const fechaInicioVal = document.getElementById('fechaInicio').value;
            const estadoActivo = document.getElementById('checkEstado').checked;
            const selectPlan = document.getElementById('selectPlan');
            const nombrePlan = selectPlan.options[selectPlan.selectedIndex].text;

            const payload = {
                empresaId: id,
                planId: selectPlan.value,
                activo: estadoActivo,
                fechaInicio: fechaInicioVal || new Date().toISOString().split('T')[0],
                tipoSuscripcion: document.getElementById('selectTipoSuscripcion').value,
                estadoSuscripcion: estadoActivo ? "ACTIVO" : "SUSPENDIDO"
            };

            const formatDate = (date) => {
                const d = new Date(date);
                let month = '' + (d.getMonth() + 1);
                let day = '' + (d.getDate() + 1); // Ajuste de zona horaria común en inputs
                const year = d.getFullYear();
                if (month.length < 2) month = '0' + month;
                if (day.length < 2) day = '0' + day;
                return [year, month, day].join('-');
            };

            // Cambio: Lógica condicional para Fecha Fin
            if (nombrePlan === "Plan Pruebas") {
                const manualFin = document.getElementById('fechaFinManual').value;
                if(!manualFin) return alert("Seleccione fecha fin para Plan Pruebas");
                payload.fechaFin = manualFin;
            } else {
                const fechaInicio = new Date(payload.fechaInicio);
                const fechaFin = new Date(fechaInicio);
                const meses = { 'MENSUAL': 1, 'TRIMESTRAL': 3, 'ANUAL': 12 , 'PRUEBAS' : 0}[payload.tipoSuscripcion];
                fechaFin.setMonth(fechaFin.getMonth() + meses);
                payload.fechaFin = formatDate(fechaFin);
            }

            payload.fechaInicio = formatDate(new Date(payload.fechaInicio));

            try {
                await axios.post(`${API}/suscripcion/crear`, payload);
                alert('Cambios guardados correctamente');
                cerrarModal();
                cargarEmpresas();
            } catch (err) {
                console.error(err);
                alert('Error al procesar la gestión');
            }
        };

        // Ejecutar al cargar
        cargarEmpresas();
    </script>
</div>

</body>
</html>
