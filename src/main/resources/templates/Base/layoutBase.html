<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrdexStep - ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-active { @apply bg-indigo-600 text-white shadow-lg shadow-indigo-900/20; }
    </style>
</head>
<body class="flex h-screen bg-slate-50">

<aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-2xl z-50">
    <div class="p-6 flex items-center space-x-3 border-b border-slate-800">
        <div class="bg-indigo-500 p-2 rounded-lg">
            <i class="fas fa-rocket text-white text-xl"></i>
        </div>
        <span class="text-white text-xl font-bold tracking-tight">OrdexStep</span>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-8">
        <div>
            <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Administración</p>
            <ul class="space-y-1">
                <li>
                    <a th:href="@{/empresas/lista}"
                       class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
                        <i class="fas fa-building w-5 text-lg group-hover:text-indigo-400"></i>
                        <span class="ml-3 font-medium">Empresas</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/usuarios/crear}"
                       class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
                        <i class="fas fa-user-plus w-5 text-lg group-hover:text-indigo-400"></i>
                        <span class="ml-3 font-medium">Nuevo Usuario</span>
                    </a>
                </li>
            </ul>
        </div>

        <div>
            <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Análisis</p>
            <ul class="space-y-1">
                <li>
                    <a href="#" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
                        <i class="fas fa-chart-line w-5 text-lg group-hover:text-indigo-400"></i>
                        <span class="ml-3 font-medium">Dashboard</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="p-4 bg-slate-950/50 border-t border-slate-800">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full flex items-center justify-center space-x-2 bg-slate-800 hover:bg-red-500/20 hover:text-red-400 p-3 rounded-xl transition-all">
                <i class="fas fa-sign-out-alt"></i>
                <span class="font-medium">Cerrar Sesión</span>
            </button>
        </form>
    </div>
</aside>

<main class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-40">
        <div class="flex items-center">
            <h2 class="text-slate-800 font-semibold text-lg" id="page-title">Panel de Control</h2>
        </div>

        <div class="flex items-center space-x-6">
            <button class="relative text-slate-400 hover:text-indigo-600 transition-colors">
                <i class="far fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">3</span>
            </button>

            <div class="flex items-center space-x-3 border-l pl-6 border-slate-200">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-bold text-slate-800 leading-none" sec:authentication="name">usuario@mail.com</p>
                    <p class="text-xs text-slate-500 mt-1">Administrador</p>
                </div>
                <div class="h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border-2 border-indigo-200">
                    <span th:with="user=${#authentication.name}" th:text="${#strings.substring(user,0,1).toUpperCase()}">U</span>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-1 p-8 overflow-y-auto scroll-smooth">
        <div class="max-w-7xl mx-auto">
            <div layout:fragment="content">
                <nav class="text-sm font-medium text-slate-400 mb-4">
                    Home / <span class="text-slate-800">Dashboard</span>
                </nav>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 min-h-[400px]">
                    <h1 class="text-2xl font-bold text-slate-800">Bienvenido al Sistema</h1>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
